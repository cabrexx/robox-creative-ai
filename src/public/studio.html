<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROBOX CREATIVE AI</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#edf2f7;
}

header{
    background:#0f172a;
    color:white;
    padding:20px 40px;
}

.container{
    width:1200px;
    max-width:95%;
    margin:30px auto;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 8px 25px rgba(0,0,0,.12);
}

.grid{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:30px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #cbd5e1;
    font-size:16px;
}

button{
    width:100%;
    margin-top:18px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
}

.preview{
    border:1px solid #ddd;
    border-radius:18px;
    background:#fafafa;
    padding:20px;
}

#banner{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,.15);
}

.topo{

    background:#0f172a;
    color:white;
    padding:20px;

}

.produto{

    display:flex;
    gap:20px;
    padding:25px;

}

.produto img{

    width:260px;
    height:260px;
    object-fit:cover;
    border-radius:15px;
    border:1px solid #ddd;

}

.info{

    flex:1;

}

.preco{

    color:#e11d48;
    font-size:42px;
    font-weight:bold;

}

.score{

    display:inline-block;
    background:#16a34a;
    color:white;
    padding:8px 14px;
    border-radius:30px;
    margin-top:10px;

}

.cta{

    background:#22c55e;
    color:white;
    text-align:center;
    font-size:24px;
    padding:18px;

}

</style>

</head>

<body>

<header>

<h1>🎨 ROBOX CREATIVE AI STUDIO</h1>

</header>

<div class="container">

<div class="card">

<div class="grid">

<div>

<label>Headline</label>
<input id="headline">

<label>Produto</label>
<input id="produto">

<label>Preço</label>
<input id="preco">

<label>Estoque</label>
<input id="estoque">

<label>Score</label>
<input id="score">

<label>Imagem</label>
<input id="imagem">

<button onclick="atualizarBanner()">

ATUALIZAR BANNER

</button>

</div>

<div class="preview">

<div id="banner">

<div class="topo">

<h2 id="b_headline"></h2>

</div>

<div class="produto">

<img id="b_imagem">

<div class="info">

<h2 id="b_produto"></h2>

<div class="preco" id="b_preco"></div>

<p>

Estoque:
<b id="b_estoque"></b>

</p>

<div class="score">

Score Robox:
<span id="b_score"></span>

</div>

</div>

</div>

<div class="cta">

CHAME NO WHATSAPP

</div>

</div>

</div>

</div>

</div>

</div>

<script>

function carregarParametros(){

const p=new URLSearchParams(location.search);

["headline","produto","preco","estoque","score","imagem"].forEach(c=>{

document.getElementById(c).value=p.get(c)||"";

});

atualizarBanner();
<button onclick="baixarBanner()" style="background:#16a34a;">
  ⬇️ BAIXAR PNG
</button>
}<button
    onclick="baixarBanner()"
    style="background:#16a34a;">

⬇️ BAIXAR PNG

</button>

function atualizarBanner(){

document.getElementById("b_headline").innerText=document.getElementById("headline").value;

document.getElementById("b_produto").innerText=document.getElementById("produto").value;

document.getElementById("b_preco").innerText=document.getElementById("preco").value;

document.getElementById("b_estoque").innerText=document.getElementById("estoque").value;

document.getElementById("b_score").innerText=document.getElementById("score").value;

const img=document.getElementById("imagem").value;

if(img){

document.getElementById("b_imagem").src=img;

}else{

document.getElementById("b_imagem").src="https://placehold.co/400x400?text=Produto";

}

}
async function baixarBanner(){
  const banner = document.getElementById("banner");

  const canvas = await html2canvas(banner, {
    backgroundColor: "#ffffff",
    scale: 2,
    useCORS: true
  });

  const link = document.createElement("a");
  link.download = "robox-campanha.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

/* FIM DA FUNÇÃO */

carregarParametros();

</script>
carregarParametros();

</script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
